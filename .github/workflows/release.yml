name: Release

# Trigger model:
#   - push to main: runs build matrix, populates the per-OS toolchain
#     caches under refs/heads/main scope. Skips the release-upload job
#     (gated on refs/tags/), so main pushes don't ship anything.
#   - push to v*.*.* tag: runs build matrix AND release-upload. Cache
#     lookups fall back to refs/heads/main and hit the warm caches the
#     latest main push wrote.
#
# This is the workaround for actions/cache@v4's per-ref scoping: caches
# created by a tag-push run live under refs/tags/<tag> and aren't visible
# to other tag refs. v0.4.1 → v0.4.2 missed every tool cache for exactly
# this reason. Now main carries the canonical caches and tags inherit.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: write

# Pinned tool versions. Cache keys below include these strings, so a
# version bump = cache miss = fresh install. Bumping is the only way to
# rotate cached binaries; pinning means we never accidentally pick up an
# upstream release that hasn't been validated against this build.
#
#   WAILS_VERSION       — must match the wails/v2 version in go.mod,
#                          otherwise the CLI's bindings/codegen can drift
#                          from the lib.
#   NFPM_VERSION        — same nfpm we use for parley/rune/phantasm.
#   APPIMAGETOOL_PIN    — opaque cache-bust string. AppImageKit only
#                          ships a rolling "continuous" tag, so we pin by
#                          the date we last vetted it. Bump to force
#                          re-download.
#   NSIS_VERSION        — choco package version for makensis. Choco
#                          install writes to a fixed path we cache.
#   AZURESIGNTOOL_VER   — dotnet-tool version for the Authenticode signer.
#                          Pinned so the ~/.dotnet/tools cache key is
#                          stable; bump when AST releases.
env:
  WAILS_VERSION: 'v2.12.0'
  NFPM_VERSION: 'v2.42.1'
  APPIMAGETOOL_PIN: 'continuous-2026-05'
  NSIS_VERSION: '3.10'
  AZURESIGNTOOL_VER: '6.0.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            artifact-glob: |
              build/bin/Mosaic-*-darwin-universal.dmg
              build/bin/Mosaic-*-darwin-universal.tar.gz
          - os: ubuntu-22.04
            platform: linux
            artifact-glob: |
              build/bin/Mosaic-*-linux-amd64.deb
              build/bin/Mosaic-*-linux-amd64.rpm
              build/bin/Mosaic-*-linux-amd64.AppImage
              build/bin/Mosaic-*-linux-amd64-mosaicd.deb
              build/bin/Mosaic-*-linux-amd64-mosaicd.rpm
              build/bin/mosaicd-*-linux-amd64.tar.gz
          - os: windows-latest
            platform: windows
            artifact-glob: |
              build/bin/Mosaic-*-windows-amd64-installer.exe
              build/bin/Mosaic-*-windows-amd64-portable.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          # Caches both the module download cache (~/go/pkg/mod) and the
          # build cache (GOCACHE) keyed on go.sum. The build cache is
          # content-addressed, so a stale entry can't satisfy a changed
          # source — Go re-keys on file content hashes.
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Resolve $(go env GOPATH)/bin in a cross-platform way and add it to
      # PATH. Subsequent cache+install steps target this dir, so the cached
      # tool binaries land where build scripts expect them.
      - name: Resolve Go bin dir
        id: gobin
        shell: bash
        run: |
          gopath_bin="$(go env GOPATH)/bin"
          mkdir -p "$gopath_bin"
          echo "path=$gopath_bin" >> "$GITHUB_OUTPUT"
          echo "$gopath_bin" >> "$GITHUB_PATH"

      # ---- wails CLI: pinned + cached across runs ----
      # Pre-pin: every release rebuilt wails from source via `go install
      # ...@latest` (~30-60s). Now the binary is cached keyed on
      # WAILS_VERSION, so installs only happen on a version bump.
      - name: Cache wails binary
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ${{ steps.gobin.outputs.path }}/wails${{ runner.os == 'Windows' && '.exe' || '' }}
          key: ${{ runner.os }}-wails-${{ env.WAILS_VERSION }}

      - name: Install wails (cache miss)
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      # --no-audit / --no-fund skip a chatty network round-trip and a
      # post-install banner; both are pure dev ergonomics noise that adds
      # a few seconds to every CI run with no signal we'd act on.
      - run: cd frontend && npm ci --no-audit --no-fund

      - name: Linux system deps (apt)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          # libfuse2 — required by appimagetool to mount itself
          # webkit2gtk-4.1-dev is what -tags webkit2_41 needs at link time
          # (Debian 12+ / Ubuntu 22.04 jammy-updates ship -4.1-0 runtime).
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config libfuse2

      # ---- nfpm: pinned + cached (Linux only) ----
      - name: Cache nfpm binary
        if: matrix.platform == 'linux'
        id: cache-nfpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.gobin.outputs.path }}/nfpm
          key: linux-nfpm-${{ env.NFPM_VERSION }}

      - name: Install nfpm (cache miss)
        if: matrix.platform == 'linux' && steps.cache-nfpm.outputs.cache-hit != 'true'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${{ env.NFPM_VERSION }}

      # ---- appimagetool: cached download (Linux only) ----
      # Pinned to APPIMAGETOOL_PIN (a date-stamp cache-bust string, since
      # AppImageKit only ships a rolling "continuous" tag). Caches under
      # ~/.local/bin so we don't need sudo to write/restore.
      - name: Add ~/.local/bin to PATH (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache appimagetool
        if: matrix.platform == 'linux'
        id: cache-appimagetool
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/appimagetool
          key: linux-appimagetool-${{ env.APPIMAGETOOL_PIN }}

      - name: Download appimagetool (cache miss)
        if: matrix.platform == 'linux' && steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          wget -qO ~/.local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x ~/.local/bin/appimagetool

      # ---- AzureSignTool: pinned + cached (Windows only) ----
      # `dotnet tool install --global` lands binaries in ~/.dotnet/tools
      # (USERPROFILE\.dotnet\tools on Windows). Caching the whole dir
      # keyed on AZURESIGNTOOL_VER lets subsequent runs skip the install.
      - name: Cache AzureSignTool
        if: matrix.platform == 'windows'
        id: cache-azuresigntool
        uses: actions/cache@v4
        with:
          path: ~\.dotnet\tools
          key: windows-azuresigntool-${{ env.AZURESIGNTOOL_VER }}

      - name: Install AzureSignTool (cache miss)
        if: matrix.platform == 'windows' && steps.cache-azuresigntool.outputs.cache-hit != 'true'
        run: dotnet tool install --global AzureSignTool --version ${{ env.AZURESIGNTOOL_VER }}

      # The install step adds ~/.dotnet/tools to PATH via shell init; on
      # a cache hit the install step is skipped, so we always re-add the
      # path here. GITHUB_PATH state is per-run, so this is cheap and
      # idempotent.
      - name: AzureSignTool to PATH
        if: matrix.platform == 'windows'
        run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      # ---- NSIS: cached install dir (Windows only) ----
      # `choco install nsis` writes a fixed install dir; we cache the whole
      # tree keyed on NSIS_VERSION so subsequent runs skip the install
      # entirely. Always re-add to PATH because GITHUB_PATH state is per-run.
      - name: Cache NSIS install
        if: matrix.platform == 'windows'
        id: cache-nsis
        uses: actions/cache@v4
        with:
          path: 'C:\Program Files (x86)\NSIS'
          key: windows-nsis-${{ env.NSIS_VERSION }}

      - name: Install NSIS (cache miss)
        if: matrix.platform == 'windows' && steps.cache-nsis.outputs.cache-hit != 'true'
        run: choco install nsis --version ${{ env.NSIS_VERSION }} -y --no-progress
        shell: pwsh

      - name: NSIS to PATH
        if: matrix.platform == 'windows'
        run: echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        env:
          VERSION: ${{ github.ref_name }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash scripts/build-macos.sh

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        env:
          VERSION: ${{ github.ref_name }}
        run: bash scripts/build-linux.sh

      - name: Build mosaicd (Linux daemon)
        if: matrix.platform == 'linux'
        env:
          VERSION: ${{ github.ref_name }}
        # Reuses the frontend/dist tree the GUI build just produced; only
        # cross-compiles the daemon binary + nfpm packages + tarball.
        run: bash scripts/build-linux-mosaicd.sh

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        env:
          VERSION: ${{ github.ref_name }}
          AZURE_KEY_VAULT_URI: ${{ secrets.AZURE_KEY_VAULT_URI }}
          AZURE_KEY_VAULT_CERT_NAME: ${{ secrets.AZURE_KEY_VAULT_CERT_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: pwsh scripts/build-windows.ps1

      - uses: actions/upload-artifact@v4
        # if: always() — ship whatever the build step did manage to produce
        # before failing. Without this a late-stage error (e.g. AppImage but
        # nfpm already wrote .deb+.rpm) means we lose all earlier artifacts.
        # if-no-files-found: warn — don't fail the upload step itself if the
        # entire build crashed before any artifact was created.
        if: always()
        with:
          name: mosaic-${{ matrix.platform }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten + checksum
        run: |
          mkdir -p out
          find dist -type f -exec cp {} out/ \;
          cd out
          sha256sum * > SHA256SUMS
      - name: Draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            out/*
          generate_release_notes: true
          body: |
            ## Mosaic ${{ github.ref_name }}

            ### Downloads

            - **macOS:** `Mosaic-${{ github.ref_name }}-darwin-universal.dmg`
            - **Linux (GUI):** `.deb`, `.rpm`, `.AppImage`
            - **Linux (headless daemon):** `Mosaic-${{ github.ref_name }}-linux-amd64-mosaicd.{deb,rpm}` + `mosaicd-${{ github.ref_name }}-linux-amd64.tar.gz`
            - **Windows:** installer + portable `.exe`

            See `SHA256SUMS` for checksum verification.

            (Auto-update users: Mosaic will pick this up within 24h. Use Settings → Updates → Check now to fetch immediately.)
