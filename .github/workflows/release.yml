name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            artifact-glob: build/bin/Mosaic-*-darwin-universal.dmg
          - os: ubuntu-22.04
            platform: linux
            artifact-glob: |
              build/bin/Mosaic-*-linux-amd64.deb
              build/bin/Mosaic-*-linux-amd64.rpm
              build/bin/Mosaic-*-linux-amd64.AppImage
          - os: windows-latest
            platform: windows
            artifact-glob: |
              build/bin/Mosaic-*-windows-amd64-installer.exe
              build/bin/Mosaic-*-windows-amd64-portable.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Linux system deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          # libfuse2 — required by appimagetool to mount itself
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config libfuse2
          # nfpm — not in jammy apt, install via go (PATH set up by setup-go)
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          # appimagetool
          wget -O /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Windows AzureSignTool
        if: matrix.platform == 'windows'
        run: dotnet tool install --global AzureSignTool

      - name: Windows NSIS
        if: matrix.platform == 'windows'
        # windows-latest doesn't ship with makensis. wails build -nsis silently
        # warns and skips the installer when it's missing; install via choco
        # so the .exe installer gets built.
        run: choco install nsis -y --no-progress
        shell: pwsh

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        env:
          VERSION: ${{ github.ref_name }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash scripts/build-macos.sh

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        env:
          VERSION: ${{ github.ref_name }}
        run: bash scripts/build-linux.sh

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        env:
          VERSION: ${{ github.ref_name }}
          AZURE_KEY_VAULT_URI: ${{ secrets.AZURE_KEY_VAULT_URI }}
          AZURE_KEY_VAULT_CERT_NAME: ${{ secrets.AZURE_KEY_VAULT_CERT_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: pwsh scripts/build-windows.ps1

      - uses: actions/upload-artifact@v4
        # if: always() — ship whatever the build step did manage to produce
        # before failing. Without this a late-stage error (e.g. AppImage but
        # nfpm already wrote .deb+.rpm) means we lose all earlier artifacts.
        # if-no-files-found: warn — don't fail the upload step itself if the
        # entire build crashed before any artifact was created.
        if: always()
        with:
          name: mosaic-${{ matrix.platform }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten + checksum
        run: |
          mkdir -p out
          find dist -type f -exec cp {} out/ \;
          cd out
          sha256sum * > SHA256SUMS
      - name: Draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            out/*
          generate_release_notes: true
          body: |
            ## Mosaic ${{ github.ref_name }}

            ### Downloads

            - **macOS:** `Mosaic-${{ github.ref_name }}-darwin-universal.dmg`
            - **Linux:** `.deb`, `.rpm`, `.AppImage`
            - **Windows:** installer + portable `.exe`

            See `SHA256SUMS` for checksum verification.

            (Auto-update users: Mosaic will pick this up within 24h. Use Settings → Updates → Check now to fetch immediately.)
