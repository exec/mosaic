name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config
      - name: Pre-build frontend for embed
        # main.go has //go:embed all:frontend/dist — without a built dist
        # the package fails to compile (and `go test ./...` rolls up that
        # failure for every package). Build the frontend first.
        run: cd frontend && npm ci && npm run build
      - run: go test ./... -race -count=1 -timeout=300s

  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm test
      - run: cd frontend && npm run build
      - run: cd frontend && npx tsc --noEmit
